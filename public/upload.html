<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>📸 上傳照片 - 回憶照片牆</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #fafafa; min-height: 100vh; }
        
        /* 導航列 */
        .navbar { background: white; border-bottom: 1px solid #dbdbdb; position: sticky; top: 0; z-index: 100; padding: 8px 16px; }
        .navbar-content { display: flex; justify-content: space-between; align-items: center; }
        .nav-left { display: flex; gap: 12px; align-items: center; }
        .nav-right { display: flex; gap: 12px; align-items: center; }
        
        .nav-icon {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #333;
        }
        .nav-icon:hover { background: #f0f0f0; transform: scale(1.05); }
        
        /* 個人資訊列（名稱 + 上傳按鈕同一行） */
        .personal-nav {
            background: white;
            border-bottom: 1px solid #dbdbdb;
            padding: 12px 16px;
            position: sticky;
            top: 60px;
            z-index: 99;
        }
        .personal-nav-row1 {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .back-arrow {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-arrow:hover { background: #f0f0f0; }
        .personal-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #667eea;
        }
        .personal-name {
            font-weight: bold;
            font-size: 20px;
            color: #333;
        }
        
        /* 上傳按鈕 - 放在名稱右邊 */
        .upload-card {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 40px;
            padding: 8px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #fafafa;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .upload-area.drag-over { border-color: #667eea; background: #f0f0ff; }
        .upload-icon { font-size: 18px; }
        .upload-text { font-size: 14px; color: #666; }
        
        .preview-container { 
            display: none; 
            align-items: center;
            gap: 8px;
        }
        .preview-img { 
            width: 40px; 
            height: 40px; 
            border-radius: 8px; 
            object-fit: cover;
        }
        .preview-filename {
            font-size: 12px;
            color: #666;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .status {
            font-size: 12px;
            color: #666;
        }
        
        .file-input { display: none; }
        
        /* 瀑布流照片牆 */
        .user-photo-grid {
            column-count: 3;
            column-gap: 4px;
            padding: 4px;
            background: #fafafa;
        }
        .user-photo-card {
            break-inside: avoid;
            margin-bottom: 4px;
            position: relative;
        }
        .user-photo-card img {
            width: 100%;
            display: block;
            border-radius: 8px;
        }
        
        .delete-btn, .set-avatar-btn, .tag-btn {
            position: absolute;
            top: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 16px;
            cursor: pointer;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .delete-btn { right: 8px; background: rgba(255,68,68,0.9); }
        .set-avatar-btn { right: 48px; background: rgba(102,126,234,0.9); }
        .tag-btn { right: 88px; background: rgba(0,0,0,0.6); }
        
        .photo-message {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 11px;
            padding: 6px 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-radius: 8px 8px 0 0;
        }
        
        @media (max-width: 768px) {
            .user-photo-grid { column-count: 2; }
            .delete-btn, .set-avatar-btn, .tag-btn { width: 28px; height: 28px; font-size: 12px; }
            .set-avatar-btn { right: 44px; }
            .tag-btn { right: 80px; }
            .personal-avatar { width: 50px; height: 50px; }
            .personal-name { font-size: 16px; }
            .upload-text { display: none; }
            .upload-area { padding: 8px 12px; }
            .upload-icon { font-size: 20px; }
        }
        
        @media (min-width: 769px) { .user-photo-grid { column-count: 3; } }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; }
        .modal-content { position: relative; margin: auto; padding: 20px; width: 90%; max-width: 800px; top: 50%; transform: translateY(-50%); }
        .modal-image { width: 100%; border-radius: 10px; }
        .modal-info { color: white; padding: 15px; text-align: center; }
        .close { position: absolute; top: 20px; right: 35px; color: white; font-size: 40px; cursor: pointer; }
        
        .loading-spinner { text-align: center; padding: 40px; color: #999; }
        .empty-message { text-align: center; padding: 40px; color: #999; }
        
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .confirm-dialog {
            background: white;
            border-radius: 16px;
            padding: 24px;
            width: 280px;
            text-align: center;
        }
        .confirm-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .confirm-btn {
            padding: 8px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }
        .confirm-btn.confirm { background: #ff4444; color: white; }
        .confirm-btn.cancel { background: #ddd; color: #333; }
    </style>
</head>
<body>

<!-- 頂部導航列 -->
<div class="navbar">
    <div class="navbar-content">
        <div class="nav-left">
            <button id="lineNavBtn" class="nav-icon" onclick="showMyAlbum()" title="LINE 個人相簿">👤</button>
            <button id="googleNavBtn" class="nav-icon" onclick="handleGoogleAction()" title="Google 登入">🎯</button>
            <a href="index.html" class="nav-icon" title="時間軸">🏠</a>
            <a href="random.html" class="nav-icon" title="隨機探索">🎲</a>
            <a href="group.html" class="nav-icon" title="群組成員">👥</a>
        </div>
        <div class="nav-right"></div>
    </div>
</div>

<!-- 個人資訊列（名稱 + 上傳按鈕同一行） -->
<div class="personal-nav">
    <div class="personal-nav-row1">
        <button class="back-arrow" onclick="goBack()">←</button>
        <img id="personalAvatar" class="personal-avatar" src="https://via.placeholder.com/60">
        <span id="personalName" class="personal-name">載入中...</span>
        
        <!-- 上傳卡片放在名稱右邊 -->
        <div class="upload-card">
            <div id="uploadArea" class="upload-area" onclick="document.getElementById('fileInput').click()">
                <span class="upload-icon">📷</span>
                <span class="upload-text">上傳</span>
            </div>
            
            <div id="previewContainer" class="preview-container" style="display:none;">
                <img id="previewImg" class="preview-img">
                <span id="previewFilename" class="preview-filename"></span>
            </div>
            
            <input type="file" id="fileInput" class="file-input" accept="image/*">
            <button id="uploadBtn" class="upload-btn" disabled>上傳</button>
            <div id="status" class="status"></div>
        </div>
    </div>
</div>

<!-- 我的照片 - 瀑布流 -->
<div id="myPhotosContainer" class="user-photo-grid">
    <div class="loading-spinner">⏳ 載入中...</div>
</div>

<!-- 照片詳情模態框 -->
<div id="photoModal" class="modal">
    <span class="close">&times;</span>
    <div class="modal-content">
        <img class="modal-image" id="modalImage">
        <div class="modal-info" id="modalInfo"></div>
    </div>
</div>

<!-- 確認刪除對話框 -->
<div id="confirmOverlay" class="confirm-overlay">
    <div class="confirm-dialog">
        <p id="confirmMessage">確定要刪除這張照片嗎？</p>
        <div class="confirm-buttons">
            <button class="confirm-btn cancel" onclick="hideConfirm()">取消</button>
            <button class="confirm-btn confirm" id="confirmDeleteBtn">刪除</button>
        </div>
    </div>
</div>

<script>
// ========== 設定 ==========
const API_BASE = 'https://photo.fernbrom.com';
const GOOGLE_CLIENT_ID = '720728907627-ops2cmqo6cj13dib4b7s15h4r5h1h0t0.apps.googleusercontent.com';

// ========== 全域變數 ==========
let googleUser = null;
let lineUserId = localStorage.getItem('userId');
let myPhotos = [];
let selectedFile = null;
let pendingDelete = { imageUrl: null, refreshCallback: null };

// ========== DOM 元素 ==========
const fileInput = document.getElementById('fileInput');
const uploadArea = document.getElementById('uploadArea');
const previewContainer = document.getElementById('previewContainer');
const previewImg = document.getElementById('previewImg');
const previewFilename = document.getElementById('previewFilename');
const uploadBtn = document.getElementById('uploadBtn');
const statusDiv = document.getElementById('status');
const myPhotosContainer = document.getElementById('myPhotosContainer');
const confirmOverlay = document.getElementById('confirmOverlay');
const personalAvatar = document.getElementById('personalAvatar');
const personalName = document.getElementById('personalName');
const photoModal = document.getElementById('photoModal');
const modalImg = document.getElementById('modalImage');
const modalInfo = document.getElementById('modalInfo');

// ========== 輔助函數 ==========
document.querySelector('.close').onclick = () => photoModal.style.display = "none";
photoModal.onclick = (e) => { if(e.target === photoModal) photoModal.style.display = "none"; };

function goBack() {
    window.location.href = 'index.html';
}

function hideConfirm() {
    confirmOverlay.style.display = 'none';
    pendingDelete = { imageUrl: null, refreshCallback: null };
}

function formatFullDateTime(isoString) {
    if(!isoString) return '';
    const d = new Date(isoString);
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function escapeHtml(t) {
    if(!t) return '';
    const div = document.createElement('div');
    div.textContent = t;
    return div.innerHTML;
}

// ========== LINE 個人相簿 ==========
function showMyAlbum() {
    if (!lineUserId) {
        alert('請從 LINE 加入好友後，點擊個人連結使用');
        return;
    }
    window.location.href = `album.html?userId=${lineUserId}`;
}

// ========== Google 登入 ==========
function getAuthToken() {
    const savedUser = localStorage.getItem('googleUser');
    if (savedUser) {
        try { return JSON.parse(savedUser).token; } catch(e) {}
    }
    return null;
}

function getCurrentUserId() {
    const savedUser = localStorage.getItem('googleUser');
    if (savedUser) {
        try { return `google_${JSON.parse(savedUser).userId}`; } catch(e) {}
    }
    return null;
}

function initGoogleLogin() {
    const savedUser = localStorage.getItem('googleUser');
    if (savedUser) {
        try {
            googleUser = JSON.parse(savedUser);
            updateGoogleButton();
            loadProfile();
        } catch(e) { console.error(e); }
    } else {
        alert('請先點擊 🎯 登入 Google');
        window.location.href = 'index.html';
    }
}

function handleGoogleAction() {
    const token = getAuthToken();
    if (token) {
        window.location.href = 'upload.html';
    } else {
        const redirectUri = window.location.origin + '/auth-callback.html';
        const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
            'client_id=' + encodeURIComponent(GOOGLE_CLIENT_ID) +
            '&redirect_uri=' + encodeURIComponent(redirectUri) +
            '&response_type=id_token' +
            '&scope=openid email profile' +
            '&nonce=' + Math.random().toString(36).substring(2) +
            '&prompt=select_account';
        window.location.href = authUrl;
    }
}

function updateGoogleButton() {
    const btn = document.getElementById('googleNavBtn');
    if (!btn) return;
    if (getAuthToken()) {
        btn.innerHTML = '📸';
        btn.title = '上傳照片';
    } else {
        btn.innerHTML = '🎯';
        btn.title = 'Google 登入';
    }
}

// ========== 載入個人資料 ==========
async function loadProfile() {
    const userId = getCurrentUserId();
    if (!userId) return;
    
    try {
        const res = await fetch(API_BASE + `/api/user/profile/${encodeURIComponent(userId)}`);
        const profile = await res.json();
        
        if (profile.displayName) {
            personalName.innerText = profile.displayName;
        } else if (googleUser) {
            personalName.innerText = googleUser.displayName || googleUser.email;
        }
        
        if (profile.avatarUrl) {
            personalAvatar.src = profile.avatarUrl;
        } else if (googleUser && googleUser.avatarUrl) {
            personalAvatar.src = googleUser.avatarUrl;
        }
    } catch(e) {
        if (googleUser) {
            personalName.innerText = googleUser.displayName || googleUser.email;
        }
    }
}

// ========== 載入我的照片（瀑布流）==========
async function loadMyPhotos() {
    const userId = getCurrentUserId();
    if (!userId) return;
    
    myPhotosContainer.innerHTML = '<div class="loading-spinner">⏳ 載入中...</div>';
    
    try {
        const res = await fetch(API_BASE + `/api/photos/user/${encodeURIComponent(userId)}`);
        myPhotos = await res.json();
        renderMyPhotos();
    } catch (error) {
        console.error('載入照片失敗:', error);
        myPhotosContainer.innerHTML = '<div class="empty-message">❌ 載入失敗，請重新整理</div>';
    }
}

function renderMyPhotos() {
    if (!myPhotos || myPhotos.length === 0) {
        myPhotosContainer.innerHTML = '<div class="empty-message">📸 暫無照片，快上傳第一張吧！</div>';
        return;
    }
    
    let html = '';
    myPhotos.forEach(photo => {
        const message = photo.message || '';
        html += `
            <div class="user-photo-card" data-url="${photo.imageUrl}" style="position:relative;">
                ${message ? `<div class="photo-message" title="${escapeHtml(message)}">💬 ${escapeHtml(message.substring(0, 20))}${message.length > 20 ? '…' : ''}</div>` : ''}
                <button class="delete-btn" onclick="event.stopPropagation(); confirmDelete('${photo.imageUrl}')" title="刪除">🗑️</button>
                <button class="set-avatar-btn" onclick="event.stopPropagation(); setAsAvatar('${photo.imageUrl}')" title="設為頭像">👤</button>
                <button class="tag-btn" onclick="event.stopPropagation(); editTag('${photo.imageUrl}', '${photo.tag || ''}')" title="編輯標籤">🏷️</button>
                <div onclick="showPhotoDetail('${photo.imageUrl}', '${photo.userId}', '${photo.time}', '${(photo.message||'').replace(/'/g,"\\'")}')">
                    <img src="${photo.imageUrl}" loading="lazy" onerror="this.src='https://via.placeholder.com/300'">
                </div>
            </div>
        `;
    });
    myPhotosContainer.innerHTML = html;
}

function showPhotoDetail(imgUrl, userId, time, msg) {
    modalImg.src = imgUrl;
    const fullDate = formatFullDateTime(time);
    modalInfo.innerHTML = `<div>📅 ${fullDate}</div>${msg ? `<div>💬 ${escapeHtml(msg)}</div>` : ''}`;
    photoModal.style.display = 'block';
}

// ========== 確認刪除 ==========
function confirmDelete(imageUrl) {
    pendingDelete = { 
        imageUrl: imageUrl, 
        refreshCallback: () => loadMyPhotos()
    };
    document.getElementById('confirmMessage').innerText = '確定要刪除這張照片嗎？';
    const confirmBtn = document.getElementById('confirmDeleteBtn');
    confirmBtn.onclick = () => executeDelete();
    confirmOverlay.style.display = 'flex';
}

async function executeDelete() {
    if (!pendingDelete.imageUrl) return;
    const { imageUrl, refreshCallback } = pendingDelete;
    hideConfirm();
    
    const token = getAuthToken();
    if (!token) {
        alert('請先登入');
        return;
    }
    
    const userId = getCurrentUserId();
    
    try {
        const res = await fetch(API_BASE + `/api/photo?imageUrl=${encodeURIComponent(imageUrl)}&userId=${encodeURIComponent(userId)}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (data.success) {
            alert('✅ 照片已刪除');
            if (refreshCallback) refreshCallback();
        } else {
            alert('刪除失敗：' + (data.error || data.message || '未知錯誤'));
        }
    } catch(e) {
        console.error('刪除錯誤:', e);
        alert('刪除失敗：' + e.message);
    }
}

// ========== 設為頭像 ==========
async function setAsAvatar(imageUrl) {
    const token = getAuthToken();
    if (!token) {
        alert('請先登入');
        return;
    }
    
    const userId = getCurrentUserId();
    
    try {
        const res = await fetch(API_BASE + '/api/user/avatar', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ userId: userId, avatarUrl: imageUrl })
        });
        const data = await res.json();
        if (data.success) {
            alert('✅ 已設為頭像！');
            personalAvatar.src = imageUrl;
        } else {
            alert('設定失敗：' + (data.error || '未知錯誤'));
        }
    } catch(e) {
        alert('設定失敗');
    }
}

// ========== 編輯標籤 ==========
async function editTag(imageUrl, currentTag) {
    const newTag = prompt('選擇標籤：\n1. 風景\n2. 美食\n3. 人物\n\n或輸入其他文字', currentTag || '');
    if (newTag === null) return;
    
    let tag = '';
    if (newTag === '1' || newTag === '風景') tag = '風景';
    else if (newTag === '2' || newTag === '美食') tag = '美食';
    else if (newTag === '3' || newTag === '人物') tag = '人物';
    else tag = newTag.trim();
    
    if (tag) {
        const token = getAuthToken();
        if (!token) {
            alert('請先登入');
            return;
        }
        
        const userId = getCurrentUserId();
        
        try {
            const res = await fetch(API_BASE + '/api/photo/tag', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ imageUrl, userId: userId, tag })
            });
            const data = await res.json();
            if (data.success) {
                alert('✅ 標籤已更新');
                loadMyPhotos();
            } else {
                alert('更新失敗：' + (data.error || '未知錯誤'));
            }
        } catch(e) {
            alert('更新失敗');
        }
    }
}

// ========== 上傳功能 ==========
fileInput.addEventListener('change', (e) => {
    if (e.target.files && e.target.files[0]) {
        selectedFile = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewImg.src = ev.target.result;
            previewFilename.innerText = selectedFile.name.substring(0, 20);
            previewContainer.style.display = 'flex';
            uploadArea.style.display = 'none';
            uploadBtn.disabled = false;
        };
        reader.readAsDataURL(selectedFile);
    }
});

uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('drag-over');
});
uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('drag-over');
});
uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
        selectedFile = e.dataTransfer.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            previewImg.src = ev.target.result;
            previewFilename.innerText = selectedFile.name.substring(0, 20);
            previewContainer.style.display = 'flex';
            uploadArea.style.display = 'none';
            uploadBtn.disabled = false;
        };
        reader.readAsDataURL(selectedFile);
        fileInput.files = e.dataTransfer.files;
    }
});

uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    
    const token = getAuthToken();
    if (!token) {
        alert('請先登入');
        return;
    }
    
    const formData = new FormData();
    formData.append('photo', selectedFile);
    // 不再有 caption
    
    uploadBtn.disabled = true;
    statusDiv.innerHTML = '⏳ 上傳中...';
    
    try {
        const res = await fetch(API_BASE + '/api/upload-web', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });
        const data = await res.json();
        
        if (data.success) {
            statusDiv.innerHTML = '✅ 上傳成功！';
            selectedFile = null;
            previewContainer.style.display = 'none';
            uploadArea.style.display = 'flex';
            fileInput.value = '';
            uploadBtn.disabled = true;
            await loadMyPhotos();
            setTimeout(() => { statusDiv.innerHTML = ''; }, 3000);
        } else {
            statusDiv.innerHTML = '❌ 上傳失敗：' + (data.error || '未知錯誤');
            uploadBtn.disabled = false;
        }
    } catch (error) {
        statusDiv.innerHTML = '❌ 上傳失敗：' + error.message;
        uploadBtn.disabled = false;
    }
});

// ========== 啟動 ==========
initGoogleLogin();
loadMyPhotos();
</script>
</body>
</html>

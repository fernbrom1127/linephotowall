<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Google 登入中...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body>
<div class="container">
    <div class="spinner"></div>
    <p id="message">登入驗證中...</p>
</div>
// auth-callback.html
<script>
// 從 URL 解析 id_token
const hashParams = new URLSearchParams(window.location.hash.substring(1));
const credential = hashParams.get('id_token');

if (credential) {
    // 儲存到 localStorage
    localStorage.setItem('pendingGoogleToken', credential);
    // 導回首頁
    window.location.href = '/photowall';
} else {
    // 登入失敗或取消，也導回首頁
    window.location.href = '/photowall';
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Google 登入中...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body>
<div class="container">
    <div class="spinner"></div>
    <p id="message">登入驗證中...</p>
</div>

<script>
    // 解析 URL 中的 id_token
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const idToken = params.get('id_token');
    const error = params.get('error');
    
    if (error) {
        document.getElementById('message').innerHTML = `<span class="error">❌ 登入失敗：${error}</span><br>請關閉此視窗重試`;
        setTimeout(() => window.close(), 3000);
    } else if (idToken) {
        // 成功取得 token，發送給主頁面
        document.getElementById('message').innerHTML = `<span class="success">✅ 登入成功！</span><br>即將關閉視窗...`;
        
        // 發送訊息給開啟此彈窗的主頁面
        if (window.opener && !window.opener.closed) {
            window.opener.postMessage({
                type: 'google_login_success',
                credential: idToken
            }, window.location.origin);
            
            // 延遲關閉彈窗
            setTimeout(() => window.close(), 1500);
        } else {
            // 如果找不到主頁面，儲存到 localStorage 並跳轉
            localStorage.setItem('pendingGoogleToken', idToken);
            document.getElementById('message').innerHTML = `<span class="success">✅ 登入成功！</span><br>請返回照片牆頁面`;
            setTimeout(() => {
                window.location.href = '/photowall';
            }, 2000);
        }
    } else {
        document.getElementById('message').innerHTML = `<span class="error">❌ 未收到登入憑證</span><br>請關閉此視窗重試`;
        setTimeout(() => window.close(), 3000);
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>蕨積網站 - 管理後台</title>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 頂部欄 */
        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            font-size: 24px;
            color: #2c3e50;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        
        .logout-btn {
            padding: 8px 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            background: #c0392b;
        }
        
        /* 統計卡片 */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #27ae60;
        }
        
        .stat-label {
            color: #7f8c8d;
            margin-top: 5px;
        }
        
        /* 搜尋欄 */
        .search-bar {
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            gap: 10px;
        }
        
        .search-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .search-btn {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        /* 會員表格 */
        .member-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #34495e;
            color: white;
            padding: 12px;
            text-align: left;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f9f9f9;
        }
        
        .edit-btn {
            padding: 5px 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .edit-btn:hover {
            background: #219a52;
        }
        
        .save-btn {
            padding: 5px 12px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        /* 編輯彈窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 400px;
            max-width: 90%;
        }
        
        .modal-content h3 {
            margin-bottom: 20px;
        }
        
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        
        .modal-buttons button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .confirm-btn {
            background: #27ae60;
            color: white;
        }
        
        .cancel-btn {
            background: #95a5a6;
            color: white;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        
        .access-denied {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 12px;
        }
        
        .access-denied h2 {
            color: #e74c3c;
            margin-bottom: 10px;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js"
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 蕨積網站 - 管理後台</h1>
            <div class="user-info" id="userInfo">
                <span id="userName"></span>
                <img id="userAvatar" class="avatar">
                <button class="logout-btn" id="logoutBtn">登出</button>
            </div>
        </div>
        
        <div id="mainContent">
            <!-- 內容會動態載入 -->
            <div class="loading">載入中...</div>
        </div>
    </div>
    
    <!-- 編輯彈窗 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>編輯會員資料</h3>
            <input type="text" id="editUserId" hidden>
            <label>會員名稱</label>
            <input type="text" id="editName" readonly style="background:#f5f5f5">
            <label>Email</label>
            <input type="text" id="editEmail" readonly style="background:#f5f5f5">
            <label>會員等級</label>
            <select id="editRole">
                <option value="一般會員">一般會員</option>
                <option value="VIP 會員">VIP 會員</option>
                <option value="管理員">管理員</option>
            </select>
            <label>金幣數量</label>
            <input type="number" id="editCoins">
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeModal()">取消</button>
                <button class="confirm-btn" onclick="saveMember()">儲存</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signOut, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, collection, getDocs, getDoc, doc, updateDoc, query, orderBy } from "firebase/firestore";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBcU1VX72FRc86PH-ezoRCB3Iv4krOKHCg",
            authDomain: "my--login-demo.firebaseapp.com",
            projectId: "my--login-demo",
            storageBucket: "my--login-demo.firebasestorage.app",
            messagingSenderId: "584315748190",
            appId: "1:584315748190:web:6f4172bbb2d99bb7efd9cf"
        };
        
        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // DOM 元素
        const mainContent = document.getElementById("mainContent");
        const userNameSpan = document.getElementById("userName");
        const userAvatarImg = document.getElementById("userAvatar");
        const logoutBtn = document.getElementById("logoutBtn");
        
        // 儲存當前編輯的文件 ID
        let currentEditUserId = null;
        
        // 監聽登入狀態
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // 未登入，顯示拒絕存取
                mainContent.innerHTML = `
                    <div class="access-denied">
                        <h2>🚫 存取被拒絕</h2>
                        <p>請先登入會員</p>
                        <button onclick="location.href='testmember.html'" style="margin-top:20px; padding:10px 20px; background:#3498db; color:white; border:none; border-radius:8px; cursor:pointer;">前往登入</button>
                    </div>
                `;
                userNameSpan.textContent = "";
                userAvatarImg.src = "";
                return;
            }
            
            // 顯示使用者資訊
            userNameSpan.textContent = user.displayName || user.email;
            userAvatarImg.src = user.photoURL || "";
            
            // 檢查是否為管理員
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
            const userRole = userSnap.data()?.role || "一般會員";
            
            if (userRole !== "管理員") {
                mainContent.innerHTML = `
                    <div class="access-denied">
                        <h2>🚫 權限不足</h2>
                        <p>只有管理員可以進入後台</p>
                        <button onclick="location.href='index.html'" style="margin-top:20px; padding:10px 20px; background:#3498db; color:white; border:none; border-radius:8px; cursor:pointer;">返回首頁</button>
                    </div>
                `;
                return;
            }
            
            // 是管理員，載入會員列表
            loadMembers();
        });
        
        // 載入所有會員
        async function loadMembers(searchText = "") {
            mainContent.innerHTML = '<div class="loading">載入會員資料...</div>';
            
            try {
                const usersRef = collection(db, "users");
                const q = query(usersRef, orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                let members = [];
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    members.push({
                        id: doc.id,
                        name: data.name || "無",
                        email: data.email || "無",
                        role: data.role || "一般會員",
                        coins: data.coins || 0,
                        avatar: data.avatar || "",
                        createdAt: data.createdAt ? data.createdAt.toDate() : null
                    });
                });
                
                // 搜尋過濾
                if (searchText) {
                    const lowerSearch = searchText.toLowerCase();
                    members = members.filter(m => 
                        m.name.toLowerCase().includes(lowerSearch) || 
                        m.email.toLowerCase().includes(lowerSearch)
                    );
                }
                
                // 計算統計
                const totalMembers = members.length;
                const totalCoins = members.reduce((sum, m) => sum + m.coins, 0);
                const vipCount = members.filter(m => m.role === "VIP 會員").length;
                
                // 渲染畫面
                renderDashboard(members, totalMembers, totalCoins, vipCount);
                
            } catch (error) {
                console.error("載入失敗:", error);
                mainContent.innerHTML = `<div class="loading">載入失敗：${error.message}</div>`;
            }
        }
        
        // 渲染儀表板
        function renderDashboard(members, totalMembers, totalCoins, vipCount) {
            const html = `
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number">${totalMembers}</div>
                        <div class="stat-label">總會員數</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${totalCoins}</div>
                        <div class="stat-label">總金幣數</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${vipCount}</div>
                        <div class="stat-label">VIP 會員數</div>
                    </div>
                </div>
                
                <div class="search-bar">
                    <input type="text" class="search-input" id="searchInput" placeholder="搜尋會員名稱或 Email...">
                    <button class="search-btn" id="searchBtn">🔍 搜尋</button>
                    <button class="search-btn" id="resetBtn" style="background:#95a5a6;">重置</button>
                </div>
                
                <div class="member-table">
                    <table>
                        <thead>
                            <tr>
                                <th>大頭貼</th>
                                <th>名稱</th>
                                <th>Email</th>
                                <th>會員等級</th>
                                <th>金幣</th>
                                <th>註冊時間</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${members.map(member => `
                                <tr>
                                    <td><img src="${member.avatar || 'https://via.placeholder.com/40'}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;"></td>
                                    <td>${escapeHtml(member.name)}</td>
                                    <td>${escapeHtml(member.email)}</td>
                                    <td><span style="background:${member.role === '管理員' ? '#e74c3c' : (member.role === 'VIP 會員' ? '#f39c12' : '#95a5a6')}; color:white; padding:2px 8px; border-radius:20px; font-size:12px;">${member.role}</span></td>
                                    <td>${member.coins}</td>
                                    <td>${member.createdAt ? member.createdAt.toLocaleDateString() : "未知"}</td>
                                    <td>
                                        <button class="edit-btn" onclick="window.editMember('${member.id}', '${escapeHtml(member.name)}', '${escapeHtml(member.email)}', '${member.role}', ${member.coins})">✏️ 編輯</button>
                                    </td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </div>
            `;
            
            mainContent.innerHTML = html;
            
            // 綁定搜尋事件
            document.getElementById("searchBtn").onclick = () => {
                const searchText = document.getElementById("searchInput").value;
                loadMembers(searchText);
            };
            document.getElementById("resetBtn").onclick = () => {
                document.getElementById("searchInput").value = "";
                loadMembers();
            };
            document.getElementById("searchInput").onkeypress = (e) => {
                if (e.key === "Enter") {
                    loadMembers(e.target.value);
                }
            };
        }
        
        // 編輯會員（全域函數，供 onclick 呼叫）
        window.editMember = (userId, name, email, role, coins) => {
            currentEditUserId = userId;
            document.getElementById("editUserId").value = userId;
            document.getElementById("editName").value = name;
            document.getElementById("editEmail").value = email;
            document.getElementById("editRole").value = role;
            document.getElementById("editCoins").value = coins;
            document.getElementById("editModal").style.display = "flex";
        };
        
        // 關閉彈窗（全域）
        window.closeModal = () => {
            document.getElementById("editModal").style.display = "none";
            currentEditUserId = null;
        };
        
        // 儲存會員修改（全域）
        window.saveMember = async () => {
            const userId = document.getElementById("editUserId").value;
            const newRole = document.getElementById("editRole").value;
            const newCoins = parseInt(document.getElementById("editCoins").value);
            
            if (isNaN(newCoins)) {
                alert("請輸入有效的金幣數量");
                return;
            }
            
            try {
                const userRef = doc(db, "users", userId);
                await updateDoc(userRef, {
                    role: newRole,
                    coins: newCoins
                });
                
                alert("✅ 會員資料已更新");
                closeModal();
                loadMembers(); // 重新載入列表
            } catch (error) {
                alert("更新失敗：" + error.message);
            }
        };
        
        // 登出
        logoutBtn.onclick = async () => {
            await signOut(auth);
            location.href = "index.html";
        };
        
        // HTML 跳脫函數
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === "&") return "&amp;";
                if (m === "<") return "&lt;";
                if (m === ">") return "&gt;";
                return m;
            });
        }
    </script>
</body>
</html>

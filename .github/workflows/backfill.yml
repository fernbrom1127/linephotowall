name: Backfill AI Tags (Google Vision)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    environment: photo  # ★★★ 加上這行，指定使用你的 photo 環境 ★★★
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install @google-cloud/vision google-spreadsheet google-auth-library axios
      
      - name: Run backfill script with Google Vision
        env:
          # Google Sheets 設定
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          # Google Vision API 設定
          GOOGLE_VISION_KEY_JSON: ${{ secrets.GOOGLE_VISION_KEY_JSON }}
        run: node backfill-google-vision.js

# .github/workflows/update-photos-json.yml
name: 更新 photos.json

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 呼叫 API 取得照片
        run: |
          curl -s "https://photo.fernbrom.com/api/photos" > public/photos.json
          
      - name: 提交變更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/photos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "自動更新照片 $(date +'%Y-%m-%d %H:%M:%S')"
          git push
